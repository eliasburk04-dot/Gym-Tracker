name: taplift
description: "Ultra-fast gym reps/sets tracker with Live Activity support."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Routing
  go_router: ^14.8.1

  # Auth
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.2

  # Network
  http: ^1.3.0

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  connectivity_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  drift_dev: ^2.22.1
  json_serializable: ^6.9.4
  freezed: ^2.5.8

flutter:
  uses-material-design: true
