services:
  db:
    image: postgres:16
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taplift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-taplift}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-taplift} -d ${POSTGRES_DB:-taplift}']
      interval: 3s
      timeout: 3s
      retries: 30
    networks:
      - backend

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${API_PORT:-3001}
      HOST: '0.0.0.0'
      DATABASE_URL: ${DATABASE_URL}
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH:-./firebase-service-account.json}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    ports:
      - '0.0.0.0:${API_PORT:-3001}:${API_PORT:-3001}'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:${API_PORT:-3001}/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend
      - egress

networks:
  backend:
    internal: true
  egress:
