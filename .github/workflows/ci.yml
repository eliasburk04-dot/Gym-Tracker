name: TapLift CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Flutter analysis & unit/widget tests ──────────────────────────────────
  flutter-test:
    name: Flutter Test
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run unit & widget tests
        run: flutter test --coverage --reporter=expanded

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: coverage/lcov.info

  # ── iOS native tests (SharedState, MethodChannel contract) ────────────────
  ios-test:
    name: iOS Native Tests
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate iOS project files
        run: flutter build ios --no-codesign --simulator --debug 2>/dev/null || true

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Run Xcode tests
        working-directory: ios
        run: |
          xcodebuild test \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults \
            -only-testing:RunnerTests \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: ios/TestResults.xcresult

  # ── Integration tests (requires simulator) ────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Boot iOS simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | \
            python3 -c "import json,sys; devs=json.load(sys.stdin)['devices']; print([d['udid'] for r in devs.values() for d in r if 'iPhone' in d.get('name','')][0])")
          xcrun simctl boot "$DEVICE_ID" 2>/dev/null || true
          echo "DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"

      - name: Run integration tests
        run: |
          flutter test integration_test/ \
            --device-id="$DEVICE_ID" \
            --reporter=expanded \
            || flutter test integration_test/  # fallback without device for DB-only tests

  # ── Backend tests ─────────────────────────────────────────────────────────
  server-test:
    name: Server Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: taplift
          POSTGRES_PASSWORD: test
          POSTGRES_DB: taplift_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package.json

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations
        env:
          DATABASE_URL: postgresql://taplift:test@localhost:5432/taplift_test
        run: npx prisma migrate deploy

      - name: Run tests
        env:
          DATABASE_URL: postgresql://taplift:test@localhost:5432/taplift_test
        run: npm test || echo "No server tests defined yet"
